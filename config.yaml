# Deep Research Agent Configuration
# Copy and edit this file to tune the agent. CLI args override these values.
#
# Research depth (Gradio "Mode" or CLI --research-mode): merges one of these over this file:
#   config_research_basic.yaml    | config_research_advanced.yaml

# ── Search Settings ──
search:
  provider: "tavily" # "exa", "tavily", "gensee", or "gensee_deep"
  max_iterations: 3 # max research loop iterations
  queries_per_iteration: 10 # search queries generated per iteration
  results_per_query: 5 # results returned per query
  search_depth: "advanced" # "basic" (1 credit) or "advanced" (2 credits)
  include_raw_content: true # fetch full page content with search results

# ── Extract / Enrichment Settings ──
extract:
  fetch_full_pages: true # enrich evidence with full page content
  extract_depth: "basic" # "basic" or "advanced" (for tables/structured data)
  full_page_max_chars: 10000 # max chars per enriched page

# ── Caching Settings ──
cache:
  enabled: true # enable SQLite TTL cache for search and full-page extraction
  db_path: ".cache/research_cache.sqlite" # cache file path
  search_ttl_seconds: 43200 # 6h TTL for search responses
  full_page_ttl_seconds: 43200 # 12h TTL for full-page extracted content
  log: False # INFO summary lines to console / root logger; also written to process log if --log
  log_verbose: false # per-query / per-URL HIT/MISS/STORE lines (noisy)

# ── Model Settings ──
models:
  # ---------- Phase 1 ----------
  classifier: "gpt-5-nano"
  planner_simple: "gpt-5-mini"
  planner_complex: "gpt-5.2"
  normalizer: "gpt-5-nano"
  coverage: "gpt-5-nano"
  writer: "gpt-5.2"

  # ---------- Phase 2 ----------
  decompose: "gpt-5.2"
  section_query: "gpt-5-mini"
  section_summary: "gpt-5-mini"
  section_coverage: "gpt-5-nano"
  conflict_detect: "gpt-5-mini"
  conflict_resolver: "gpt-5-mini"

# ── Writer Settings ──
writer:
  context_max_items: 50 # max evidence items passed to writer

# ── Section Worker Settings (Phase 2) ──
section:
  max_iterations: 5 # max iterations per section worker
  queries_per_iteration: 5 # search queries per section iteration
  max_parallel: 15 # max sections to research in parallel
  # Section summary quality: more evidence = better summaries (higher token cost)
  summary_top_n: 5 # max evidence items passed to section summary (was 10)
  summary_snippet_chars: 1200 # max chars per snippet in summary (was 500)
  # summary_evidence_max_chars: 20000 # optional: fill with full snippets until this budget (0 = use top_n + snippet_chars)

# ── Conflict Resolution (Phase 2) ──
conflict:
  resolution_enabled: true # enable conflict resolution research

# ── Report Structure ──
# Choose how the final report is structured. Two options:
#
#   Option A — preset number (defined in report_presets.yaml):
#     1  Standard           General-purpose report with findings and analysis
#     2  Brief              Concise summary for quick read-outs
#     3  Academic           Scholarly write-up (abstract → references)
#     4  Comparative        Side-by-side analysis of two subjects
#     5  Investigative      Deep-dive with root-cause analysis and recommendations
#     6  OpenAI-style       Data-driven, citation-rich (Deep Research API style)
#     7  Perplexity-style   Answer-first BLUF, supporting evidence, sources
#     8  Consulting         McKinsey/BCG: situation–complication–resolution
#     9  IEEE/Technical     Standard technical report (abstract → appendix)
#    10  LangChain-style    Docs: overview, concepts, how-to, examples
#
#   Option B — explicit section list (overrides preset when both are set):
#     structure:
#       - "Title"
#       - "My Custom Section"
#       - "Sources"
#
# Only one of `preset` or `structure` needs to be set.
report:
  preset: 9 # Use preset 1 (Standard). Change to 2–10 for other layouts.
  # structure:                # Uncomment and fill to define a fully custom structure.
  #   - "Title"
  #   - "Executive Summary"
  #   - "Main Findings"
  #   - "Detailed Analysis by Section"
  #   - "Conclusion"
  #   - "Sources"

# ── Prompt Overrides (optional) ──
# Set any key to a full replacement string to override the default prompt. Leave null to use built-in.
# Keys: writer, enhanced_writer, report_assembly, research_plan, research_plan_edit, classify, planner_initial, planner_followup,
#       normalize, coverage, decompose, section_query, section_query_followup, section_normalize,
#       section_coverage, section_summary, section_draft, conflict_detect, conflict_resolve, conflict_adjudicate
prompts: {}
