# Research preset: Basic (faster / lower cost).
# Merged on top of config.yaml when Gradio mode = Basic (or load_config_file(..., research_mode="basic")).
# Shared settings (models, cache, report preset, provider, writer, etc.) stay in config.yaml.

search:
  max_iterations: 1
  queries_per_iteration: 2
  results_per_query: 2
  search_depth: "basic"
  include_raw_content: true

extract:
  fetch_full_pages: true
  extract_depth: "basic"
  full_page_max_chars: 5000

section:
  max_iterations: 1
  queries_per_iteration: 2
  max_parallel: 15
  summary_top_n: 5
  summary_snippet_chars: 1200

conflict:
  resolution_enabled: true
